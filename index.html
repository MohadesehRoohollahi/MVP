<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batenno</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="hero">

        <header class="navbar">
            <div class="logo-container">
                <img src="logo2.png" alt="Logo">
                <span>Batenno</span>
            </div>
        </header>

        <div class="hero-content">
            <h1>طعم اصیل طبیعت با قیمتی منطقی</h1>
            <p>.میوه‌های %100 ارگانیک و سالم با ظاهر نامتعارف با %40 تخفیف به دست شما می‌رسند</p>
            <a href="#" class="btn" onclick="openModal()">سفارش سبد این هفته</a>

            <div id="popup" class="modal">
                <div class="modal-content">
                    <span class="close" onclick="closeModal()">&times;</span>

                    <h2>ظرفیت این هفته تکمیل شد</h2>

                    <p>
                        به دلیل استقبال زیاد، ظرفیت این هفته تکمیل شده است.
                        برای قرارگیری در اولویت رزرو هفته آینده، ایمیل خود را وارد کنید.
                    </p>

                    <form id="emailForm">
                        <input type="email" id="email" required>
                        <button type="submit">ثبت</button>
                    </form>
                </div>
            </div>
        </div>

    </section>

    <script>

    const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyXM9lYtkrmkyIpJ9JiCP5n1BhUBbfESUK0DM_wWQJ27C048hqoLX_jSH3MaBcBmlHf/exec";

function openModal() {

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            event:"button_click"
        })
    });

    document
      .getElementById("popup")
      .style.display = "flex";
}

function closeModal() {
    document.getElementById("popup").style.display = "none";
}

document
.getElementById("emailForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email =
      document.getElementById("email").value;

    await fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            event:"email_signup",
            email:email
        })
    });

    alert("ایمیل شما ثبت شد");
});

</script>

</body>
</html>
